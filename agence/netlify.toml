[build]
  publish = "agence"

# URLs propres vers tes pages HTML
[[redirects]]
  from = "/growth"
  to = "/growth.html"
  status = 200

[[redirects]]
  from = "/conditions"
  to = "/conditions.html"
  status = 200

[[redirects]]
  from = "/parrainage"
  to = "/parrainage.html"
  status = 200

# (Optionnel) si quelqu'un tape /index
[[redirects]]
  from = "/index"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

    # CSP compatible GTM + GA4 (et ton setup actuel)
    Content-Security-Policy = """
default-src 'self';
base-uri 'self';
form-action 'self';
frame-ancestors 'none';
object-src 'none';

img-src 'self' https: data:;
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src 'self' https://fonts.gstatic.com data:;

script-src 'self' 'unsafe-inline' 'unsafe-eval'
  https://unpkg.com
  https://threejs.org
  https://www.googletagmanager.com
  https://www.google-analytics.com
  https://tagmanager.google.com;

script-src-elem 'self' 'unsafe-inline' 'unsafe-eval'
  https://unpkg.com
  https://threejs.org
  https://www.googletagmanager.com
  https://www.google-analytics.com
  https://tagmanager.google.com;

# IMPORTANT pour GA4/GTM : autoriser les calls réseau vers Google
connect-src 'self'
  https://*.netlify.app
  https://api.netlify.com
  https://www.google-analytics.com
  https://region1.google-analytics.com
  https://stats.g.doubleclick.net
  https://www.googletagmanager.com
  https://tagmanager.google.com;

# IMPORTANT pour GTM : le "noscript iframe" charge souvent via googletagmanager.com
frame-src 'self'
  https://www.googletagmanager.com
  https://tagmanager.google.com;
"""
