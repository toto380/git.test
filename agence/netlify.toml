[build]
  publish = "agence"

# -----------------------------
# Canonical domains -> .fr
# -----------------------------
[[redirects]]
  from = "https://stratads.agency/*"
  to = "https://stratads.fr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.stratads.agency/*"
  to = "https://stratads.fr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://stratads.eu/*"
  to = "https://stratads.fr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.stratads.eu/*"
  to = "https://stratads.fr/:splat"
  status = 301
  force = true

# (Optionnel mais recommandé) www.fr -> fr
[[redirects]]
  from = "https://www.stratads.fr/*"
  to = "https://stratads.fr/:splat"
  status = 301
  force = true


# -----------------------------
# Pretty URLs -> HTML pages
# -----------------------------
[[redirects]]
  from = "/growth"
  to = "/growth.html"
  status = 200

[[redirects]]
  from = "/parrainage"
  to = "/parrainage.html"
  status = 200

# D'après ton repo: conditionsp.html
[[redirects]]
  from = "/conditions"
  to = "/conditionsp.html"
  status = 200


# -----------------------------
# Headers / CSP
# -----------------------------
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

    Content-Security-Policy = """
default-src 'self';
base-uri 'self';
form-action 'self';
frame-ancestors 'none';
object-src 'none';

img-src 'self' https: data:;
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com;
font-src 'self' https://fonts.gstatic.com data:;

script-src
  'self'
  'unsafe-inline'
  'unsafe-eval'
  https://cdn.tailwindcss.com
  https://cdnjs.cloudflare.com
  https://unpkg.com
  https://threejs.org
  https://fonts.googleapis.com
  https://www.googletagmanager.com
  https://www.google-analytics.com
  https://tagmanager.google.com;

script-src-elem
  'self'
  'unsafe-inline'
  'unsafe-eval'
  https://cdn.tailwindcss.com
  https://cdnjs.cloudflare.com
  https://unpkg.com
  https://threejs.org
  https://fonts.googleapis.com
  https://www.googletagmanager.com
  https://www.google-analytics.com
  https://tagmanager.google.com;

connect-src
  'self'
  https://*.netlify.app
  https://api.netlify.com
  https://www.google-analytics.com
  https://region1.google-analytics.com
  https://stats.g.doubleclick.net
  https://www.googletagmanager.com;

frame-src
  'self'
  https://www.googletagmanager.com
  https://tagmanager.google.com;
"""
